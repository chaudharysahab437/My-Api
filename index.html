<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        /* Full Screen Mirror Viewport */
        #stream-mirror-frame {
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

    <iframe id="stream-mirror-frame" 
            src="/api/bypass" 
            allowfullscreen 
            allow="autoplay; encrypted-media; fullscreen; picture-in-picture">
    </iframe>

</body>
</html>
